name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-14
            os: macos
          - target: macos-x64
            runner: macos-13
            os: macos
          - target: linux-x64
            runner: ubuntu-22.04
            os: linux
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            os: linux
          - target: windows-x64
            runner: windows-2022
            os: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          ref="${GITHUB_REF##*/}"
          version="${ref#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # -------- macOS --------
      - name: macOS deps
        if: matrix.os == 'macos'
        run: |
          brew update
          brew install cmake libssh sdl2 freetype

      - name: macOS build + package
        if: matrix.os == 'macos'
        shell: bash
        run: ./scripts/build.sh --target ${{ matrix.target }} --version ${{ steps.ver.outputs.version }}

      # -------- Linux --------
      - name: Linux deps
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential cmake pkg-config ninja-build \
              libssh-dev libsdl2-dev libfreetype-dev zip

      - name: Linux build + package
        if: matrix.os == 'linux'
        shell: bash
        run: ./scripts/build.sh --target ${{ matrix.target }} --version ${{ steps.ver.outputs.version }}

      # -------- Windows --------
      - name: Setup vcpkg
        if: matrix.os == 'windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'c82f74667287d3dc386bce81e44964370c91a289'
          runVcpkgInstall: false

      - name: Windows build + package
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: 'clear'
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $build = "build/windows-x64"
          $toolchain = "$env:RUNVCPKG_VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          if (-not (Test-Path $toolchain)) { $toolchain = "$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" }
          if (-not (Test-Path $toolchain)) { $toolchain = "$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" }
          Write-Host "Using vcpkg toolchain: $toolchain"
          New-Item -ItemType Directory -Path $build -Force | Out-Null
          cmake -S . -B $build -G "Visual Studio 17 2022" -A x64 `
            "-DCMAKE_TOOLCHAIN_FILE=$toolchain" `
            "-DVCPKG_TARGET_TRIPLET=x64-windows" `
            "-DSHADOWSSH_VERSION=$version"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build $build --config Release --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $out = "dist/ShadowSSH-$version-windows-x64"
          New-Item -ItemType Directory -Path $out -Force | Out-Null
          Copy-Item "$build/Release/ShadowSSH.exe" $out
          Get-ChildItem "$build/Release/*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination $out
          Copy-Item LICENSE,README.md $out -ErrorAction SilentlyContinue
          Compress-Archive -Path $out -DestinationPath "dist/ShadowSSH-$version-windows-x64.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shadowssh-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          ref="${GITHUB_REF##*/}"
          version="${ref#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} release/ \;
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ShadowSSH ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: release/*
