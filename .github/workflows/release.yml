name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-14
            os: macos
          - target: macos-x64
            runner: macos-14
            os: macos-cross-x64
          - target: linux-x64
            runner: ubuntu-22.04
            os: linux
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            os: linux
          - target: windows-x64
            runner: windows-2022
            os: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          ref="${GITHUB_REF##*/}"
          version="${ref#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # -------- macOS (native arm64) --------
      - name: macOS deps
        if: matrix.os == 'macos'
        run: |
          brew update
          brew install cmake libssh sdl2 freetype

      - name: macOS build + package
        if: matrix.os == 'macos'
        shell: bash
        run: ./scripts/build.sh --target ${{ matrix.target }} --version ${{ steps.ver.outputs.version }}

      # -------- macOS Intel cross-build (Rosetta + x86_64 brew) --------
      # Apple-silicon runners are widely available; Intel runners queue for
      # 30+ min. We cross-compile x86_64 by installing the Homebrew x86_64
      # stack alongside the native arm64 one under /usr/local.
      - name: Install Rosetta + x86_64 Homebrew + deps
        if: matrix.os == 'macos-cross-x64'
        run: |
          /usr/sbin/softwareupdate --install-rosetta --agree-to-license || true
          if ! [ -x /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" </dev/null
          fi
          arch -x86_64 /usr/local/bin/brew update
          arch -x86_64 /usr/local/bin/brew install libssh sdl2 freetype pkg-config
          file /usr/local/opt/libssh/lib/libssh*.dylib | head -5

      - name: macOS x64 cross-build + package
        if: matrix.os == 'macos-cross-x64'
        shell: bash
        env:
          CMAKE_PREFIX_PATH: /usr/local
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/local/opt/libssh/lib/pkgconfig:/usr/local/opt/sdl2/lib/pkgconfig:/usr/local/opt/freetype/lib/pkgconfig
        run: |
          version="${{ steps.ver.outputs.version }}"
          target=macos-x64
          build_dir="build/$target"
          rm -rf "$build_dir" && mkdir -p "$build_dir"
          cmake -S . -B "$build_dir" \
            -DCMAKE_BUILD_TYPE=Release \
            -DSHADOWSSH_VERSION="$version" \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_PREFIX_PATH=/usr/local
          cmake --build "$build_dir" --parallel
          out="dist/ShadowSSH-$version-$target"
          rm -rf "$out" && mkdir -p "$out"
          cp -R "$build_dir/ShadowSSH.app" "$out/"
          ( cd dist && tar -czf "ShadowSSH-$version-$target.tar.gz" "ShadowSSH-$version-$target" )
          file "$build_dir/ShadowSSH.app/Contents/MacOS/ShadowSSH"

      # -------- Linux --------
      - name: Linux deps
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential cmake pkg-config ninja-build \
              libssh-dev libsdl2-dev libfreetype-dev zip

      - name: Linux build + package
        if: matrix.os == 'linux'
        shell: bash
        run: ./scripts/build.sh --target ${{ matrix.target }} --version ${{ steps.ver.outputs.version }}

      # -------- Windows --------
      - name: Setup vcpkg
        if: matrix.os == 'windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '1ea949145db9db7c9b254062f94acdaeed947767'
          runVcpkgInstall: false

      - name: Windows build + package
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: 'clear'
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $build = "build/windows-x64"
          $toolchain = "$env:RUNVCPKG_VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          if (-not (Test-Path $toolchain)) { $toolchain = "$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" }
          if (-not (Test-Path $toolchain)) { $toolchain = "$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" }
          Write-Host "Using vcpkg toolchain: $toolchain"
          New-Item -ItemType Directory -Path $build -Force | Out-Null
          cmake -S . -B $build -G "Visual Studio 17 2022" -A x64 `
            "-DCMAKE_TOOLCHAIN_FILE=$toolchain" `
            "-DVCPKG_TARGET_TRIPLET=x64-windows" `
            "-DSHADOWSSH_VERSION=$version"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build $build --config Release --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $out = "dist/ShadowSSH-$version-windows-x64"
          New-Item -ItemType Directory -Path $out -Force | Out-Null
          Copy-Item "$build/Release/ShadowSSH.exe" $out
          Get-ChildItem "$build/Release/*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination $out
          Copy-Item LICENSE,README.md $out -ErrorAction SilentlyContinue
          Compress-Archive -Path $out -DestinationPath "dist/ShadowSSH-$version-windows-x64.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shadowssh-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          ref="${GITHUB_REF##*/}"
          version="${ref#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} release/ \;
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ShadowSSH ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: release/*
